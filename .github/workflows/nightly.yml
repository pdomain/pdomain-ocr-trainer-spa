name: nightly

on:
  schedule:
    - cron: "0 3 * * *"  # 03:00 UTC daily
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  slow-tests:
    name: slow tests
    runs-on: ubuntu-22.04
    env:
      UV_PYTHON: "3.13"
      CUDA_VISIBLE_DEVICES: ""
    steps:
      - uses: actions/checkout@v4
      # Clone sibling repos that pyproject.toml [tool.uv.sources] references
      # as local editable paths (../pd-book-tools, ../pd-ocr-ops,
      # ../pd-ocr-training).  Without these the `uv sync` in `make setup`
      # fails with "Distribution not found".
      - uses: actions/checkout@v4
        with:
          repository: ConcaveTrillion/pd-book-tools
          path: ../pd-book-tools
      - uses: actions/checkout@v4
        with:
          repository: ConcaveTrillion/pd-ocr-ops
          path: ../pd-ocr-ops
      - uses: actions/checkout@v4
        with:
          repository: ConcaveTrillion/pd-ocr-training
          path: ../pd-ocr-training
      - uses: jdx/mise-action@v2
      - uses: astral-sh/setup-uv@v4
        with:
          version: latest
      - run: make setup
      - run: make test-slow
      - name: Open draft issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[nightly] slow tests failed ${new Date().toISOString().slice(0,10)}`,
              body: `Nightly slow test run failed. See [workflow run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}).`,
              draft: true,
              labels: ['nightly-failure'],
            });
