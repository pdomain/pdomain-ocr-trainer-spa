name: nightly

on:
  schedule:
    - cron: "0 3 * * *"  # 03:00 UTC daily
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  slow-tests:
    name: slow tests
    runs-on: ubuntu-22.04
    env:
      UV_PYTHON: "3.13"
      CUDA_VISIBLE_DEVICES: ""
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151  # v4.0.1
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          version: latest
      - run: make setup
      - run: make test-slow
      - name: Open draft issue on failure
        if: failure()
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3  # v9.0.0
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[nightly] slow tests failed ${new Date().toISOString().slice(0,10)}`,
              body: `Nightly slow test run failed. See [workflow run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}).`,
              draft: true,
              labels: ['nightly-failure'],
            });
