default_install_hook_types: [pre-commit, commit-msg]

repos:
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
    -   id: trailing-whitespace
    -   id: end-of-file-fixer
    -   id: check-yaml
    -   id: check-json
    -   id: check-toml
    -   id: check-added-large-files
        args: [--maxkb=1000]
    -   id: debug-statements
    -   id: check-merge-conflict
-   repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
    -   id: gitleaks
-   repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.13
    hooks:
    -   id: ruff-check
        args: [--select, I, --fix]
    -   id: ruff-check
        args: [--fix]
    -   id: ruff-format
-   repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.22.1
    hooks:
    -   id: markdownlint-cli2
    -   id: markdownlint-cli2
        alias: markdownlint-cli2-fix
        args: [--fix]
        stages: [manual]
-   repo: https://github.com/jorisroovers/gitlint
    rev: v0.19.1
    hooks:
    -   id: gitlint
        stages: [commit-msg]
-   repo: local
    hooks:
    -   id: uv-lock-check
        name: uv.lock is in sync with pyproject.toml
        entry: uv lock --check
        language: system
        stages: [pre-commit]
        pass_filenames: false
        files: ^(pyproject\.toml|uv\.lock)$

    -   id: basedpyright
        name: basedpyright type check (recommended mode; workspace canonical)
        entry: uv run basedpyright src/pdomain_ocr_trainer_spa --level error
        language: system
        stages: [pre-commit]
        pass_filenames: false
        files: ^src/pdomain_ocr_trainer_spa/.*\.py$
