# docgraph.toml — per-repo configuration for docgraph
# Generated by `docgraph context-init`.  Edit to match your repo layout.

schema_version = 1
roots = ['.']
mode = "git"
convention = "agent-index"
freshness_days = 30
include = ['*.md', 'docs/**/*.md']
exclude = ['agent/**', 'agents/**', 'skills/**', 'prompts/**', '.claude/**', '.codex/**', '.cursor/**', '.docgraph/**']

# Non-md files scanned for reverse references to indexed markdown docs.
# Default hard-excludes (.git, .venv, node_modules, .worktrees, dot-dirs) always apply.
reference_include = ['**/*.py', '**/*.ts', '**/*.tsx', '**/*.js', '**/*.jsx', '**/*.go', '**/*.rs', '**/*.toml', '**/*.yaml', '**/*.yml', '**/*.json']
reference_exclude = ['agent/**', 'agents/**', 'skills/**', 'prompts/**', '.claude/**', '.codex/**', '.cursor/**', '.docgraph/**', '.venv/**', 'node_modules/**']

[infer]
"specs/**" = { kind = "spec", status = "active" }
"plans/**" = { kind = "plan", status = "active" }
"architecture/**" = { kind = "architecture", status = "built" }
"process/**" = { kind = "process", status = "active" }
"research/**" = { kind = "research", status = "active" }
"runbooks/**" = { kind = "runbook", status = "active" }
"issues/**" = { kind = "issue", status = "active" }
"decisions/**" = { kind = "decision", status = "active" }

# rules are ON; run `make`/CI with `docgraph check --advisory` until the baseline is clean, then drop --advisory.
[workflow]
enabled = true
enforce_frontmatter_on_touched = true
frontmatter_base = "master"
legacy_unverified = true

[checks]
required_section_live_status_severity = "advisory"

[workflow.required_sections]
spec = ["Adversarial Review"]
research = ["Goal", "Method", "Evidence", "Conclusions", "Next steps", "What this does NOT establish"]
plan = ["Goal", "Architecture", "Tech Stack", "Global Constraints"]
runbook = ["Trigger", "Preconditions", "Steps", "Verification", "Rollback"]
decision = ["Context", "Decision", "Consequences", "Supersedes / Superseded-by"]
issue = ["Summary", "Impact", "Environment / versions", "Evidence", "Root-cause hypotheses", "Defects to fix", "Next steps", "Resolution"]

[search]
# semantic = true   # enable when sentence-transformers is installed
